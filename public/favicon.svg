<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Outer dark background -->
  <circle cx="256" cy="256" r="256" fill="#0d0d14"/>
  
  <!-- Outer gold ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#d4af37" stroke-width="18"/>
  
  <!-- Dashed notch ring (like a real chip edge) -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#d4af37" stroke-width="6" 
    stroke-dasharray="28 14" stroke-dashoffset="0"/>
  
  <!-- Second solid ring -->
  <circle cx="256" cy="256" r="212" fill="none" stroke="#d4af37" stroke-width="4"/>
  
  <!-- Red center fill -->
  <circle cx="256" cy="256" r="196" fill="#7a1414"/>
  
  <!-- Inner decorative ring on red -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#d4af37" stroke-width="3" opacity="0.5"/>
  
  <!-- Letter O -->
  <text x="256" y="336" 
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="240"
    fill="#d4af37"
    letter-spacing="-5">O</text>
    
  <!-- Subtle highlight arc top-left -->
  <path d="M 160 140 A 120 120 0 0 1 340 120" 
    fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="20" stroke-linecap="round"/>
</svg>
